name: Build Firmware

# 1. On dit à GitHub QUAND déclencher la compilation (ici, à chaque fois qu'on modifie le code)
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Permet aussi de lancer le bouton manuellement

jobs:
  build:
    runs-on: ubuntu-latest # On demande un ordinateur virtuel sous Linux

    steps:
    # Étape A : On copie le code de ton projet sur cet ordinateur virtuel
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Très important pour Retro-Go qui a besoin de ses sous-modules

    # Étape B : On installe l'outil de compilation d'Espressif (ESP-IDF)
    - name: Install ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.1' # Modifie la version selon ce que demande ton Retro-Go
        target: 'esp32s3'

    # Étape C : On lance la commande magique de fabrication du fichier .img
    - name: Build Project
      run: |
        idf.py build

    # Étape D : On demande à GitHub de sauvegarder le fichier final pour que tu puisses le télécharger
    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: retro-go-firmware
        path: build/retro-go.img
